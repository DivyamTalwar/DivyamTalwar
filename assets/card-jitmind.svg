<svg xmlns="http://www.w3.org/2000/svg" width="920" height="420" viewBox="0 0 920 420" font-family="'JetBrains Mono', ui-monospace, monospace" role="img" aria-label="JITMIND — just-in-time memory for AI agents">
  <defs>
    <marker id="ah" viewBox="0 0 6 6" refX="5.5" refY="3" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 6 3 L 0 6 z" fill="#FF8C42"/>
    </marker>
    <marker id="ahd" viewBox="0 0 6 6" refX="5.5" refY="3" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 6 3 L 0 6 z" fill="#FF8C42"/>
    </marker>
  </defs>

  <!-- Canvas -->
  <rect x="0" y="0" width="920" height="420" fill="#100a05"/>
  <rect x="0.5" y="0.5" width="919" height="419" fill="none" stroke="#FF8C42" stroke-width="1"/>

  <!-- ═══════════════ HEADER STRIP ═══════════════ -->
  <text x="32" y="44" font-size="14" font-weight="700" fill="#FF8C42" letter-spacing="0.14em">01 · JITMIND</text>
  <!-- LIVE pulsing dot -->
  <circle cx="160" cy="40" r="4" fill="#FF8C42">
    <animate attributeName="opacity" values="1;0.3;1" dur="1.5s" repeatCount="indefinite"/>
  </circle>
  <text x="172" y="44" font-size="10" fill="#a09080" letter-spacing="0.12em">RUNTIME ACTIVE</text>
  <text x="888" y="44" font-size="12" fill="#a09080" text-anchor="end">→ /JITMIND</text>
  <line x1="32" y1="64" x2="888" y2="64" stroke="#3a2510" stroke-width="1"/>

  <!-- ═══════════════ TITLE BLOCK ═══════════════ -->
  <text x="32" y="108" font-size="24" font-weight="700" fill="#fff0e0" letter-spacing="-0.01em">Just-in-time memory for AI agents.</text>
  <text x="32" y="132" font-size="13" fill="#a09080">Self-editing bi-temporal memory. Hybrid retrieval under drift.</text>

  <!-- Capability tags -->
  <g font-size="10" font-weight="600" fill="#fff0e0">
    <rect x="32" y="156" width="120" height="22" fill="none" stroke="#FF8C42" stroke-width="1"/>
    <text x="92" y="171" text-anchor="middle" letter-spacing="0.08em">BI-TEMPORAL</text>
    <rect x="160" y="156" width="152" height="22" fill="none" stroke="#FF8C42" stroke-width="1"/>
    <text x="236" y="171" text-anchor="middle" letter-spacing="0.08em">BM25+DENSE+GRAPH</text>
    <rect x="320" y="156" width="128" height="22" fill="none" stroke="#FF8C42" stroke-width="1"/>
    <text x="384" y="171" text-anchor="middle" letter-spacing="0.08em">SELF-EDITING</text>
    <rect x="456" y="156" width="152" height="22" fill="none" stroke="#FF8C42" stroke-width="1"/>
    <text x="532" y="171" text-anchor="middle" letter-spacing="0.08em">PROVENANCE-AWARE</text>
  </g>

  <!-- ═══════════════ ARCHITECTURE DIAGRAM ═══════════════ -->

  <!-- Loop-back curve REFLECT → PLAN (drawn first, behind nodes) -->
  <path d="M 637 215 C 637 188, 97 188, 97 215" stroke="#FF8C42" stroke-width="1" fill="none"
        stroke-dasharray="6 4" marker-end="url(#ahd)">
    <animate attributeName="stroke-dashoffset" from="0" to="-10" dur="1s" repeatCount="indefinite"/>
  </path>

  <!-- Node: PLAN -->
  <rect x="32" y="215" width="130" height="52" fill="none" stroke="#FF8C42" stroke-width="1"/>
  <rect x="32" y="215" width="130" height="52" fill="#FF8C42" opacity="0">
    <animate attributeName="opacity" values="0;0.18;0" dur="6s" begin="0s" repeatCount="indefinite"/>
  </rect>
  <text x="97" y="238" font-size="13" font-weight="700" fill="#fff0e0" text-anchor="middle">PLAN</text>
  <text x="97" y="254" font-size="9" fill="#a09080" text-anchor="middle">decompose query</text>

  <!-- Arrow PLAN → SEARCH -->
  <line x1="162" y1="241" x2="212" y2="241" stroke="#FF8C42" stroke-width="1.25"
        stroke-dasharray="6 4" marker-end="url(#ah)">
    <animate attributeName="stroke-dashoffset" from="0" to="-10" dur="1s" repeatCount="indefinite"/>
  </line>

  <!-- Node: SEARCH -->
  <rect x="212" y="215" width="130" height="52" fill="none" stroke="#FF8C42" stroke-width="1"/>
  <rect x="212" y="215" width="130" height="52" fill="#FF8C42" opacity="0">
    <animate attributeName="opacity" values="0;0.18;0" dur="6s" begin="1.5s" repeatCount="indefinite"/>
  </rect>
  <text x="277" y="238" font-size="13" font-weight="700" fill="#fff0e0" text-anchor="middle">SEARCH</text>
  <text x="277" y="254" font-size="9" fill="#a09080" text-anchor="middle">BM25 · dense · graph</text>

  <!-- Arrow SEARCH → INTEGRATE -->
  <line x1="342" y1="241" x2="392" y2="241" stroke="#FF8C42" stroke-width="1.25"
        stroke-dasharray="6 4" marker-end="url(#ah)">
    <animate attributeName="stroke-dashoffset" from="0" to="-10" dur="1s" repeatCount="indefinite"/>
  </line>

  <!-- Node: INTEGRATE -->
  <rect x="392" y="215" width="130" height="52" fill="none" stroke="#FF8C42" stroke-width="1"/>
  <rect x="392" y="215" width="130" height="52" fill="#FF8C42" opacity="0">
    <animate attributeName="opacity" values="0;0.18;0" dur="6s" begin="3s" repeatCount="indefinite"/>
  </rect>
  <text x="457" y="238" font-size="13" font-weight="700" fill="#fff0e0" text-anchor="middle">INTEGRATE</text>
  <text x="457" y="254" font-size="9" fill="#a09080" text-anchor="middle">RRF · PPR · rank</text>

  <!-- Arrow INTEGRATE → REFLECT -->
  <line x1="522" y1="241" x2="572" y2="241" stroke="#FF8C42" stroke-width="1.25"
        stroke-dasharray="6 4" marker-end="url(#ah)">
    <animate attributeName="stroke-dashoffset" from="0" to="-10" dur="1s" repeatCount="indefinite"/>
  </line>

  <!-- Node: REFLECT -->
  <rect x="572" y="215" width="130" height="52" fill="none" stroke="#FF8C42" stroke-width="1"/>
  <rect x="572" y="215" width="130" height="52" fill="#FF8C42" opacity="0">
    <animate attributeName="opacity" values="0;0.18;0" dur="6s" begin="4.5s" repeatCount="indefinite"/>
  </rect>
  <text x="637" y="238" font-size="13" font-weight="700" fill="#fff0e0" text-anchor="middle">REFLECT</text>
  <text x="637" y="254" font-size="9" fill="#a09080" text-anchor="middle">validate · revise</text>

  <!-- ═══════════════ MEMORY OPS PANEL ═══════════════ -->
  <text x="720" y="222" font-size="9" font-weight="700" fill="#FF8C42" letter-spacing="0.14em">MEMORY OPS</text>
  <text x="720" y="240" font-size="11" fill="#fff0e0">
    <tspan fill="#FF8C42"><animate attributeName="opacity" values="1;0.4;1" dur="2s" begin="0s" repeatCount="indefinite"/>▸</tspan> ADD
  </text>
  <text x="720" y="256" font-size="11" fill="#fff0e0">
    <tspan fill="#FF8C42"><animate attributeName="opacity" values="1;0.4;1" dur="2s" begin="0.5s" repeatCount="indefinite"/>▸</tspan> UPDATE
  </text>
  <text x="720" y="272" font-size="11" fill="#fff0e0">
    <tspan fill="#FF8C42"><animate attributeName="opacity" values="1;0.4;1" dur="2s" begin="1s" repeatCount="indefinite"/>▸</tspan> DELETE
  </text>
  <text x="720" y="288" font-size="11" fill="#fff0e0">
    <tspan fill="#FF8C42"><animate attributeName="opacity" values="1;0.4;1" dur="2s" begin="1.5s" repeatCount="indefinite"/>▸</tspan> NOOP
  </text>

  <!-- ═══════════════ BI-TEMPORAL AXIS ═══════════════ -->
  <text x="460" y="340" font-size="9" fill="#a09080" text-anchor="middle" letter-spacing="0.18em">BI-TEMPORAL VALIDITY</text>
  <line x1="40" y1="355" x2="880" y2="355" stroke="#3a2510" stroke-width="1"/>

  <!-- Ticks (8px tall, centered) -->
  <line x1="80"  y1="351" x2="80"  y2="359" stroke="#FF8C42" stroke-width="1.5"/>
  <line x1="240" y1="351" x2="240" y2="359" stroke="#FF8C42" stroke-width="1.5"/>
  <line x1="440" y1="351" x2="440" y2="359" stroke="#FF8C42" stroke-width="1.5"/>
  <line x1="640" y1="351" x2="640" y2="359" stroke="#FF8C42" stroke-width="1.5"/>
  <line x1="840" y1="351" x2="840" y2="359" stroke="#FF8C42" stroke-width="1.5"/>

  <!-- Traveling trail (ghost) -->
  <circle cy="355" r="4" fill="#FF8C42" opacity="0.25">
    <animate attributeName="cx" values="80;840;80" dur="5s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.25;0.1;0.25" dur="5s" repeatCount="indefinite"/>
  </circle>
  <!-- Traveling accent dot -->
  <circle cy="355" r="4" fill="#FF8C42">
    <animate attributeName="cx" values="80;840;80" dur="5s" repeatCount="indefinite"/>
  </circle>

  <!-- Tick labels -->
  <text x="80"  y="372" font-size="10" fill="#a09080" text-anchor="middle">t_created</text>
  <text x="240" y="372" font-size="10" fill="#a09080" text-anchor="middle">t_observed</text>
  <text x="440" y="372" font-size="10" fill="#a09080" text-anchor="middle">t_valid</text>
  <text x="640" y="372" font-size="10" fill="#a09080" text-anchor="middle">t_invalid</text>
  <text x="840" y="372" font-size="10" fill="#a09080" text-anchor="middle">t_expired</text>

  <!-- ═══════════════ BOTTOM KEYWORD STRIP ═══════════════ -->
  <text x="460" y="400" font-size="11" fill="#a09080" text-anchor="middle" letter-spacing="0.1em">BITEMPORAL<tspan fill="#FF8C42">  ·  </tspan>SELF-EDITING<tspan fill="#FF8C42">  ·  </tspan>HYBRID-RETRIEVAL<tspan fill="#FF8C42">  ·  </tspan>PROVENANCE<tspan fill="#FF8C42">  ·  </tspan>PPR</text>
</svg>
