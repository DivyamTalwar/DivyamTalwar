<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 280" width="1280" height="280" role="img" aria-label="Divyam Talwar — I build what agents run on.">
  <title>Divyam Talwar — Neural Runtimes · LIVE</title>

  <defs>
    <!-- Scanning gradient for the sweep line -->
    <linearGradient id="scan" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#FF8C42" stop-opacity="0"/>
      <stop offset="50%"  stop-color="#FF8C42" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#FF8C42" stop-opacity="0"/>
    </linearGradient>
    <!-- Glow filter for the name -->
    <filter id="glow" x="-5%" y="-30%" width="110%" height="160%">
      <feGaussianBlur stdDeviation="2.5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Base canvas -->
  <rect width="1280" height="280" fill="#100a05"/>

  <!-- Subtle vertical grid -->
  <g stroke="#FF8C42" stroke-opacity="0.04" stroke-width="1">
    <line x1="106"  y1="0" x2="106"  y2="280"/>
    <line x1="213"  y1="0" x2="213"  y2="280"/>
    <line x1="320"  y1="0" x2="320"  y2="280"/>
    <line x1="426"  y1="0" x2="426"  y2="280"/>
    <line x1="533"  y1="0" x2="533"  y2="280"/>
    <line x1="640"  y1="0" x2="640"  y2="280"/>
    <line x1="746"  y1="0" x2="746"  y2="280"/>
    <line x1="853"  y1="0" x2="853"  y2="280"/>
    <line x1="960"  y1="0" x2="960"  y2="280"/>
    <line x1="1066" y1="0" x2="1066" y2="280"/>
    <line x1="1173" y1="0" x2="1173" y2="280"/>
  </g>

  <!-- ANIMATED SCANLINE — sweeps top to bottom, repeats -->
  <rect x="0" width="1280" height="2" fill="url(#scan)" opacity="0.55">
    <animate attributeName="y" from="-4" to="284" dur="6s" repeatCount="indefinite"/>
  </rect>

  <!-- LIVE indicator top-left — pulsing dot + label -->
  <g font-family="'JetBrains Mono', ui-monospace, 'SF Mono', Menlo, Consolas, monospace">
    <circle cx="50" cy="34" r="5" fill="#FF8C42">
      <animate attributeName="opacity" values="1;0.25;1" dur="1.4s" repeatCount="indefinite"/>
      <animate attributeName="r"       values="5;7;5"     dur="1.4s" repeatCount="indefinite"/>
    </circle>
    <text x="64" y="38" font-size="11" font-weight="700" fill="#FF8C42" letter-spacing="0.18em">LIVE</text>
    <text x="100" y="38" font-size="11" font-weight="500" fill="#a09080" letter-spacing="0.08em">SYSTEM ONLINE · v2026.04</text>

    <!-- Right side meta: version + live build counter -->
    <text x="1232" y="38" font-size="11" font-weight="500" fill="#a09080" letter-spacing="0.08em" text-anchor="end">
      11 SYSTEMS · ALL GREEN
    </text>
  </g>

  <!-- Top rule -->
  <line x1="0" y1="52" x2="1280" y2="52" stroke="#3a2510" stroke-width="1"/>

  <!-- THE NAME — with subtle glow + breathing pulse -->
  <text x="48" y="178"
        font-family="'JetBrains Mono', ui-monospace, 'SF Mono', Menlo, Consolas, monospace"
        font-size="108" font-weight="900" fill="#fff0e0" letter-spacing="-0.04em"
        filter="url(#glow)">
    DIVYAM TALWAR
    <animate attributeName="opacity" values="1;0.94;1" dur="4s" repeatCount="indefinite"/>
  </text>

  <!-- ANIMATED ACCENT RULE — breathes width + brightness -->
  <rect x="48" y="198" height="3" fill="#FF8C42">
    <animate attributeName="width"   values="240;320;240" dur="3.2s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="1;0.55;1"    dur="3.2s" repeatCount="indefinite"/>
  </rect>

  <!-- Tagline (two stacked lines) -->
  <g font-family="'JetBrains Mono', ui-monospace, 'SF Mono', Menlo, Consolas, monospace" font-size="17" font-weight="700" letter-spacing="0.06em">
    <text x="48" y="230" fill="#fff0e0">I DON'T BUILD AGENTS.</text>
    <text x="48" y="254" fill="#FF8C42">I BUILD WHAT AGENTS RUN ON.</text>
  </g>

  <!-- Right meta block — 2 rows -->
  <g font-family="'JetBrains Mono', ui-monospace, 'SF Mono', Menlo, Consolas, monospace" font-size="11">
    <text x="1024" y="124" fill="#a09080" font-weight="500" letter-spacing="0.08em" text-anchor="end">FOCUS</text>
    <text x="1040" y="124" fill="#FF8C42" font-weight="700">━</text>
    <text x="1232" y="124" fill="#fff0e0" font-weight="700" letter-spacing="0.04em" text-anchor="end">NEURAL RUNTIMES</text>

    <text x="1024" y="146" fill="#a09080" font-weight="500" letter-spacing="0.08em" text-anchor="end">DOMAIN</text>
    <text x="1040" y="146" fill="#FF8C42" font-weight="700">━</text>
    <text x="1232" y="146" fill="#fff0e0" font-weight="700" letter-spacing="0.04em" text-anchor="end">MEMORY · STRUCTURE · COMPUTE</text>
  </g>

  <!-- Right side stack indicator with rotating tool name -->
  <g font-family="'JetBrains Mono', ui-monospace, 'SF Mono', Menlo, Consolas, monospace" font-size="11">
    <text x="1024" y="184" fill="#a09080" font-weight="500" letter-spacing="0.08em" text-anchor="end">STACK</text>
    <text x="1040" y="184" fill="#FF8C42" font-weight="700">━</text>
    <text x="1232" y="184" fill="#fff0e0" font-weight="700" letter-spacing="0.04em" text-anchor="end">
      <tspan>PYTORCH · CUDA · RUST</tspan>
      <animate attributeName="opacity" values="1;0;1" dur="6s" repeatCount="indefinite"
               keyTimes="0;0.49;0.51" begin="0s"/>
    </text>
    <text x="1232" y="184" fill="#fff0e0" font-weight="700" letter-spacing="0.04em" text-anchor="end" opacity="0">
      <tspan>JAX · TRITON · PYTHON</tspan>
      <animate attributeName="opacity" values="0;1;0" dur="6s" repeatCount="indefinite"
               keyTimes="0;0.5;1" begin="0s"/>
    </text>
  </g>

  <!-- BLINKING TERMINAL PROMPT (bottom-right) -->
  <text x="1232" y="256"
        font-family="'JetBrains Mono', ui-monospace, 'SF Mono', Menlo, Consolas, monospace"
        font-size="20" font-weight="900" fill="#FF8C42" text-anchor="end">
    [ ▸ ]
    <animate attributeName="opacity" values="1;0.15;1" dur="1.1s" repeatCount="indefinite"/>
  </text>

  <!-- Bottom-left typing-style prompt prefix -->
  <text x="48" y="270"
        font-family="'JetBrains Mono', ui-monospace, 'SF Mono', Menlo, Consolas, monospace"
        font-size="10" font-weight="500" fill="#a09080" letter-spacing="0.12em">
    PRESS ENTER TO BUILD ▸
  </text>
</svg>
