<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 420" width="920" height="420" role="img" aria-label="Structorium — architecture automatically enforced">
  <style>
    .mono { font-family: 'JetBrains Mono', ui-monospace, 'SF Mono', Menlo, Consolas, monospace; }
  </style>

  <defs>
    <clipPath id="pipeClip"><rect x="14" y="205" width="770" height="72"/></clipPath>
  </defs>

  <!-- Background + borders -->
  <rect x="0" y="0" width="920" height="420" fill="#100a05"/>
  <rect x="0.5" y="0.5" width="919" height="419" fill="none" stroke="#FF8C42" stroke-width="1"/>
  <rect x="6" y="6" width="908" height="408" fill="none" stroke="#FF8C42" stroke-width="0.5" opacity="0.45"/>

  <!-- ============ 1. HEADER STRIP ============ -->
  <text x="32" y="44" class="mono" font-size="14" font-weight="700" fill="#FF8C42" letter-spacing="0.14em">02 · STRUCTORIUM</text>
  <circle cx="200" cy="40" r="4" fill="#FF8C42">
    <animate attributeName="opacity" values="1;0.3;1" dur="1.5s" repeatCount="indefinite"/>
  </circle>
  <text x="212" y="44" class="mono" font-size="10" fill="#a09080" letter-spacing="0.1em">GATE OPERATIONAL</text>
  <text x="888" y="44" class="mono" font-size="12" fill="#a09080" text-anchor="end">→ /STRUCTORIUM</text>
  <line x1="32" y1="64" x2="888" y2="64" stroke="#3a2510" stroke-width="1"/>

  <!-- ============ 2. TITLE + SUBTITLE + CHIPS ============ -->
  <text x="32" y="108" class="mono" font-size="24" font-weight="700" fill="#fff0e0" letter-spacing="-0.01em">Architecture. Automatically enforced.</text>
  <text x="32" y="132" class="mono" font-size="13" fill="#a09080">Codebase quality runtime. Every scan remembers. Every regression is caught.</text>

  <!-- Capability chips -->
  <g font-family="'JetBrains Mono', ui-monospace, monospace" font-size="10" font-weight="600" fill="#fff0e0">
    <rect x="32"  y="156" width="140" height="22" fill="none" stroke="#FF8C42" stroke-width="1"/>
    <text x="102" y="171" text-anchor="middle" letter-spacing="0.08em">28 LANGUAGES</text>
    <rect x="180" y="156" width="150" height="22" fill="none" stroke="#FF8C42" stroke-width="1"/>
    <text x="255" y="171" text-anchor="middle" letter-spacing="0.08em">30+ DETECTORS</text>
    <rect x="340" y="156" width="160" height="22" fill="none" stroke="#FF8C42" stroke-width="1"/>
    <text x="420" y="171" text-anchor="middle" letter-spacing="0.08em">AI-CONTEXT-LAYER</text>
    <rect x="510" y="156" width="170" height="22" fill="none" stroke="#FF8C42" stroke-width="1"/>
    <text x="595" y="171" text-anchor="middle" letter-spacing="0.08em">ANTI-GAMING SCORE</text>
  </g>

  <!-- ============ 3. PIPELINE ============ -->
  <!-- Stage boxes with active-stage highlight overlays -->
  <g>
    <!-- SCAN -->
    <rect x="24"  y="215" width="140" height="52" fill="none" stroke="#FF8C42" stroke-width="1"/>
    <rect x="24"  y="215" width="140" height="52" fill="#FF8C42" opacity="0">
      <animate attributeName="opacity" values="0;0.18;0" dur="6s" begin="0s" repeatCount="indefinite"/>
    </rect>
    <text x="94"  y="240" class="mono" font-size="13" font-weight="700" fill="#fff0e0" text-anchor="middle">SCAN</text>
    <text x="94"  y="256" class="mono" font-size="9"  fill="#a09080" text-anchor="middle">parallel detectors</text>

    <!-- RANK -->
    <rect x="176" y="215" width="140" height="52" fill="none" stroke="#FF8C42" stroke-width="1"/>
    <rect x="176" y="215" width="140" height="52" fill="#FF8C42" opacity="0">
      <animate attributeName="opacity" values="0;0.18;0" dur="6s" begin="1.2s" repeatCount="indefinite"/>
    </rect>
    <text x="246" y="240" class="mono" font-size="13" font-weight="700" fill="#fff0e0" text-anchor="middle">RANK</text>
    <text x="246" y="256" class="mono" font-size="9"  fill="#a09080" text-anchor="middle">severity · debt</text>

    <!-- REVIEW -->
    <rect x="328" y="215" width="140" height="52" fill="none" stroke="#FF8C42" stroke-width="1"/>
    <rect x="328" y="215" width="140" height="52" fill="#FF8C42" opacity="0">
      <animate attributeName="opacity" values="0;0.18;0" dur="6s" begin="2.4s" repeatCount="indefinite"/>
    </rect>
    <text x="398" y="240" class="mono" font-size="13" font-weight="700" fill="#fff0e0" text-anchor="middle">REVIEW</text>
    <text x="398" y="256" class="mono" font-size="9"  fill="#a09080" text-anchor="middle">AI-aware</text>

    <!-- GATE -->
    <rect x="480" y="215" width="140" height="52" fill="none" stroke="#FF8C42" stroke-width="1"/>
    <rect x="480" y="215" width="140" height="52" fill="#FF8C42" opacity="0">
      <animate attributeName="opacity" values="0;0.18;0" dur="6s" begin="3.6s" repeatCount="indefinite"/>
    </rect>
    <text x="550" y="240" class="mono" font-size="13" font-weight="700" fill="#fff0e0" text-anchor="middle">GATE</text>
    <text x="550" y="256" class="mono" font-size="9"  fill="#a09080" text-anchor="middle">block or pass</text>

    <!-- SCORE -->
    <rect x="632" y="215" width="140" height="52" fill="none" stroke="#FF8C42" stroke-width="1"/>
    <rect x="632" y="215" width="140" height="52" fill="#FF8C42" opacity="0">
      <animate attributeName="opacity" values="0;0.18;0" dur="6s" begin="4.8s" repeatCount="indefinite"/>
    </rect>
    <text x="702" y="240" class="mono" font-size="13" font-weight="700" fill="#fff0e0" text-anchor="middle">SCORE</text>
    <text x="702" y="256" class="mono" font-size="9"  fill="#a09080" text-anchor="middle">delta tracking</text>
  </g>

  <!-- Flowing arrows between stages (animated dash) -->
  <g stroke="#FF8C42" stroke-width="1.2" fill="none">
    <line x1="164" y1="241" x2="176" y2="241" stroke-dasharray="3 2">
      <animate attributeName="stroke-dashoffset" from="10" to="0" dur="0.8s" repeatCount="indefinite"/>
    </line>
    <line x1="316" y1="241" x2="328" y2="241" stroke-dasharray="3 2">
      <animate attributeName="stroke-dashoffset" from="10" to="0" dur="0.8s" repeatCount="indefinite"/>
    </line>
    <line x1="468" y1="241" x2="480" y2="241" stroke-dasharray="3 2">
      <animate attributeName="stroke-dashoffset" from="10" to="0" dur="0.8s" repeatCount="indefinite"/>
    </line>
    <line x1="620" y1="241" x2="632" y2="241" stroke-dasharray="3 2">
      <animate attributeName="stroke-dashoffset" from="10" to="0" dur="0.8s" repeatCount="indefinite"/>
    </line>
  </g>

  <!-- PR particles flowing through pipeline -->
  <g clip-path="url(#pipeClip)">
    <circle r="3" cy="241" fill="#FF8C42">
      <animate attributeName="cx" from="-10" to="790" dur="4s" begin="0s"    repeatCount="indefinite"/>
    </circle>
    <circle r="3" cy="241" fill="#FF8C42">
      <animate attributeName="cx" from="-10" to="790" dur="4s" begin="1.3s"  repeatCount="indefinite"/>
    </circle>
    <circle r="3" cy="241" fill="#FF8C42">
      <animate attributeName="cx" from="-10" to="790" dur="4s" begin="2.6s"  repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- ============ 4. GATE DRAMA ============ -->
  <!-- LEFT: incoming PRs queue -->
  <text x="80" y="312" class="mono" font-size="9" fill="#a09080" letter-spacing="0.16em">INCOMING PRs</text>
  <g fill="#a09080">
    <rect x="80"  y="320" width="30" height="8"/>
    <rect x="115" y="320" width="30" height="8"/>
    <rect x="150" y="320" width="30" height="8"/>
    <rect x="80"  y="332" width="30" height="8"/>
    <rect x="115" y="332" width="30" height="8"/>
    <rect x="80"  y="344" width="30" height="8"/>
  </g>

  <!-- CENTER: the GATE -->
  <text x="370" y="312" class="mono" font-size="10" font-weight="700" fill="#FF8C42" letter-spacing="0.14em" text-anchor="middle">PR GATE</text>
  <!-- passed PR (left of bar, accent) -->
  <rect x="320" y="332" width="30" height="8" fill="#FF8C42">
    <animate attributeName="x" values="290;320;320" keyTimes="0;0.4;1" dur="3s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;1;1" keyTimes="0;0.4;1" dur="3s" repeatCount="indefinite"/>
  </rect>
  <!-- vertical gate bar -->
  <rect x="368" y="320" width="4" height="40" fill="#FF8C42"/>
  <!-- blocked PR (right of bar, fg white) -->
  <rect x="390" y="332" width="30" height="8" fill="#fff0e0">
    <animate attributeName="opacity" values="1;1;0.25;1" keyTimes="0;0.5;0.7;1" dur="3s" repeatCount="indefinite"/>
  </rect>

  <!-- RIGHT: merged stats -->
  <text x="510" y="312" class="mono" font-size="9" fill="#a09080" letter-spacing="0.16em">MERGED</text>
  <text x="510" y="340" class="mono" font-size="18" font-weight="900" fill="#FF8C42" letter-spacing="-0.02em">2,847 ✓</text>
  <text x="510" y="354" class="mono" font-size="8" fill="#a09080" letter-spacing="0.18em">PRS GATED THIS WEEK</text>

  <!-- divider before bottom strip -->
  <line x1="32" y1="370" x2="888" y2="370" stroke="#3a2510" stroke-width="1"/>

  <!-- ============ 5. BOTTOM METRICS ============ -->
  <g font-family="'JetBrains Mono', ui-monospace, monospace" text-anchor="middle">
    <text x="180" y="398" font-size="32" font-weight="900" fill="#FF8C42" letter-spacing="-0.03em">28</text>
    <text x="180" y="412" font-size="9"  fill="#a09080" letter-spacing="0.18em">LANGUAGES</text>

    <text x="460" y="398" font-size="32" font-weight="900" fill="#FF8C42" letter-spacing="-0.03em">30+</text>
    <text x="460" y="412" font-size="9"  fill="#a09080" letter-spacing="0.18em">DETECTORS</text>

    <text x="740" y="398" font-size="32" font-weight="900" fill="#FF8C42" letter-spacing="-0.03em">100%</text>
    <text x="740" y="412" font-size="9"  fill="#a09080" letter-spacing="0.18em">CI-GATED</text>
  </g>
</svg>
