<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 495 195" width="495" height="195" role="img" aria-label="Polyglot stack: 8 languages weighted by active use" style="font-family:'JetBrains Mono',ui-monospace,monospace">
  <rect x="0" y="0" width="495" height="195" fill="#100a05"/>
  <rect x="0.5" y="0.5" width="494" height="194" fill="none" stroke="#FF8C42" stroke-width="1"/>

  <text x="20" y="28" font-size="13" font-weight="700" fill="#FF8C42" letter-spacing="0.18em">POLYGLOT</text>
  <text x="475" y="28" font-size="10" fill="#a09080" text-anchor="end">8 LANGUAGES</text>

  <line x1="20" y1="42" x2="475" y2="42" stroke="#3a2510" stroke-width="1"/>

  <!-- PYTHON 34% -->
  <text x="20" y="69" font-size="11" font-weight="600" fill="#fff0e0">PYTHON</text>
  <rect x="110" y="60" width="280" height="10" fill="#1a1208"/>
  <rect x="110" y="60" width="95.2" height="10" fill="#FF8C42"/>
  <text x="475" y="69" font-size="10" fill="#a09080" text-anchor="end">34%</text>

  <!-- RUST 18% -->
  <text x="20" y="85" font-size="11" font-weight="600" fill="#fff0e0">RUST</text>
  <rect x="110" y="76" width="280" height="10" fill="#1a1208"/>
  <rect x="110" y="76" width="50.4" height="10" fill="#FF8C42"/>
  <text x="475" y="85" font-size="10" fill="#a09080" text-anchor="end">18%</text>

  <!-- TYPESCRIPT 14% -->
  <text x="20" y="101" font-size="11" font-weight="600" fill="#fff0e0">TYPESCRIPT</text>
  <rect x="110" y="92" width="280" height="10" fill="#1a1208"/>
  <rect x="110" y="92" width="39.2" height="10" fill="#FF8C42"/>
  <text x="475" y="101" font-size="10" fill="#a09080" text-anchor="end">14%</text>

  <!-- C++ 11% -->
  <text x="20" y="117" font-size="11" font-weight="600" fill="#fff0e0">C++</text>
  <rect x="110" y="108" width="280" height="10" fill="#1a1208"/>
  <rect x="110" y="108" width="30.8" height="10" fill="#FF8C42"/>
  <text x="475" y="117" font-size="10" fill="#a09080" text-anchor="end">11%</text>

  <!-- CUDA 9% -->
  <text x="20" y="133" font-size="11" font-weight="600" fill="#fff0e0">CUDA</text>
  <rect x="110" y="124" width="280" height="10" fill="#1a1208"/>
  <rect x="110" y="124" width="25.2" height="10" fill="#FF8C42"/>
  <text x="475" y="133" font-size="10" fill="#a09080" text-anchor="end">9%</text>

  <!-- GO 7% -->
  <text x="20" y="149" font-size="11" font-weight="600" fill="#fff0e0">GO</text>
  <rect x="110" y="140" width="280" height="10" fill="#1a1208"/>
  <rect x="110" y="140" width="19.6" height="10" fill="#FF8C42"/>
  <text x="475" y="149" font-size="10" fill="#a09080" text-anchor="end">7%</text>

  <!-- LUA 4% -->
  <text x="20" y="165" font-size="11" font-weight="600" fill="#fff0e0">LUA</text>
  <rect x="110" y="156" width="280" height="10" fill="#1a1208"/>
  <rect x="110" y="156" width="11.2" height="10" fill="#FF8C42"/>
  <text x="475" y="165" font-size="10" fill="#a09080" text-anchor="end">4%</text>

  <!-- BASH 3% -->
  <text x="20" y="181" font-size="11" font-weight="600" fill="#fff0e0">BASH</text>
  <rect x="110" y="172" width="280" height="10" fill="#1a1208"/>
  <rect x="110" y="172" width="8.4" height="10" fill="#FF8C42"/>
  <text x="475" y="181" font-size="10" fill="#a09080" text-anchor="end">3%</text>

  <text x="20" y="192" font-size="8" fill="#a09080" letter-spacing="0.1em">SELF-REPORTED · WEIGHTED BY ACTIVE USE</text>
