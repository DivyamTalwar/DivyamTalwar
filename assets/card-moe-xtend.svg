<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 420" width="920" height="420" font-family="'JetBrains Mono', ui-monospace, monospace">
  <defs>
    <marker id="ah" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 Z" fill="#FF8C42"/>
    </marker>
    <!-- Flowing dot path: input(204,242) -> router(300,242) -> E3(420,274) -> output(760,242) -->
    <path id="p1" d="M 204 242 L 260 242 L 340 242 L 380 274 L 420 274 L 540 274 L 760 242" fill="none"/>
    <!-- Second path through E6 -->
    <path id="p2" d="M 204 242 L 260 242 L 340 242 L 380 240 L 460 240 L 640 240 L 760 242" fill="none"/>
  </defs>

  <!-- Background + borders -->
  <rect width="920" height="420" fill="#100a05"/>
  <rect x="0.5" y="0.5" width="919" height="419" fill="none" stroke="#FF8C42" stroke-width="1"/>
  <rect x="4.5" y="4.5" width="911" height="411" fill="none" stroke="#FF8C42" stroke-width="0.5" opacity="0.5"/>

  <!-- 1. HEADER STRIP -->
  <text x="32" y="44" font-size="14" font-weight="700" fill="#FF8C42" letter-spacing="0.14em">03 · MoE-XTEND</text>
  <circle cx="180" cy="40" r="4" fill="#FF8C42">
    <animate attributeName="opacity" values="0.3;1;0.3" dur="1.4s" repeatCount="indefinite"/>
  </circle>
  <text x="192" y="44" font-size="10" fill="#a09080" letter-spacing="0.14em">EXPERTS ONLINE</text>
  <text x="888" y="44" text-anchor="end" font-size="12" fill="#a09080">→ /MoE-Xtend</text>
  <line x1="24" y1="64" x2="896" y2="64" stroke="#3a2510" stroke-width="1"/>

  <!-- 2. TITLE + TAGLINE + CHIPS -->
  <text x="32" y="108" font-size="24" font-weight="700" fill="#fff0e0">Context unbound. Intelligence unleashed.</text>
  <text x="32" y="132" font-size="13" fill="#a09080">Long-context sparse mixture-of-experts. GQA, RoPE+YaRN scaling, deterministic decode.</text>

  <!-- Capability chips -->
  <g font-size="10" font-weight="600" fill="#fff0e0" letter-spacing="0.1em">
    <rect x="32" y="156" width="110" height="22" fill="none" stroke="#FF8C42" stroke-width="1"/>
    <text x="87" y="171" text-anchor="middle">SPARSE MoE</text>
    <rect x="148" y="156" width="110" height="22" fill="none" stroke="#FF8C42" stroke-width="1"/>
    <text x="203" y="171" text-anchor="middle">TOP-K=2</text>
    <rect x="264" y="156" width="80" height="22" fill="none" stroke="#FF8C42" stroke-width="1"/>
    <text x="304" y="171" text-anchor="middle">GQA</text>
    <rect x="350" y="156" width="114" height="22" fill="none" stroke="#FF8C42" stroke-width="1"/>
    <text x="407" y="171" text-anchor="middle">ROPE+YARN</text>
    <rect x="470" y="156" width="114" height="22" fill="none" stroke="#FF8C42" stroke-width="1"/>
    <text x="527" y="171" text-anchor="middle">1M CONTEXT</text>
  </g>

  <!-- 3. MAIN ROUTING DIAGRAM -->

  <!-- Input token stream -->
  <text x="32" y="214" font-size="9" fill="#a09080" letter-spacing="0.14em">INPUT STREAM</text>
  <g font-size="9" fill="#fff0e0" text-anchor="middle">
    <rect x="32"  y="230" width="28" height="24" fill="none" stroke="#FF8C42" stroke-width="1"/><text x="46"  y="245">t1</text>
    <rect x="64"  y="230" width="28" height="24" fill="none" stroke="#FF8C42" stroke-width="1"/><text x="78"  y="245">t2</text>
    <rect x="96"  y="230" width="28" height="24" fill="none" stroke="#FF8C42" stroke-width="1"/><text x="110" y="245">t3</text>
    <rect x="128" y="230" width="28" height="24" fill="none" stroke="#FF8C42" stroke-width="1"/><text x="142" y="245">t4</text>
    <rect x="160" y="230" width="28" height="24" fill="none" stroke="#FF8C42" stroke-width="1"/><text x="174" y="245">t5</text>
  </g>

  <!-- Router -->
  <circle cx="300" cy="242" r="40" fill="none" stroke="#FF8C42" stroke-width="2"/>
  <text x="300" y="252" font-size="26" font-weight="900" fill="#FF8C42" text-anchor="middle">R</text>
  <text x="300" y="295" font-size="9" fill="#a09080" text-anchor="middle" letter-spacing="0.14em">TOP-K ROUTER</text>
  <!-- Router pulse/ping -->
  <circle cx="300" cy="242" r="40" fill="none" stroke="#FF8C42" stroke-width="1" opacity="0.6">
    <animate attributeName="r" values="40;60;40" dur="2s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.6;0;0.6" dur="2s" repeatCount="indefinite"/>
  </circle>

  <!-- Input -> Router -->
  <line x1="204" y1="242" x2="260" y2="242" stroke="#FF8C42" stroke-width="1.5" marker-end="url(#ah)"/>

  <!-- Candidate fan-out from router to all 8 experts -->
  <g stroke="#3a2510" stroke-width="0.7">
    <line x1="340" y1="242" x2="460" y2="206"/>
    <line x1="340" y1="242" x2="460" y2="240"/>
    <line x1="340" y1="242" x2="460" y2="274"/>
    <line x1="340" y1="242" x2="460" y2="308"/>
    <line x1="340" y1="242" x2="560" y2="206"/>
    <line x1="340" y1="242" x2="560" y2="240"/>
    <line x1="340" y1="242" x2="560" y2="274"/>
    <line x1="340" y1="242" x2="560" y2="308"/>
  </g>

  <!-- Expert grid 4x2 -->
  <g font-size="11" text-anchor="middle">
    <!-- col1 x=460..540 -->
    <rect x="460" y="190" width="80" height="32" fill="none" stroke="#3a2510"/><text x="500" y="210" fill="#a09080">E1</text>
    <rect x="460" y="224" width="80" height="32" fill="none" stroke="#3a2510"/><text x="500" y="244" fill="#a09080">E2</text>
    <!-- E3 ACTIVE -->
    <rect x="460" y="258" width="80" height="32" fill="#FF8C42" opacity="0.15">
      <animate attributeName="opacity" values="0.1;0.3;0.1" dur="1.8s" repeatCount="indefinite"/>
    </rect>
    <rect x="460" y="258" width="80" height="32" fill="none" stroke="#FF8C42" stroke-width="2"/>
    <text x="500" y="278" fill="#fff0e0" font-weight="700">E3</text>
    <rect x="460" y="292" width="80" height="32" fill="none" stroke="#3a2510"/><text x="500" y="312" fill="#a09080">E4</text>
    <!-- col2 x=560..640 -->
    <rect x="560" y="190" width="80" height="32" fill="none" stroke="#3a2510"/><text x="600" y="210" fill="#a09080">E5</text>
    <!-- E6 ACTIVE -->
    <rect x="560" y="224" width="80" height="32" fill="#FF8C42" opacity="0.15">
      <animate attributeName="opacity" values="0.1;0.3;0.1" dur="1.8s" begin="0.9s" repeatCount="indefinite"/>
    </rect>
    <rect x="560" y="224" width="80" height="32" fill="none" stroke="#FF8C42" stroke-width="2"/>
    <text x="600" y="244" fill="#fff0e0" font-weight="700">E6</text>
    <rect x="560" y="258" width="80" height="32" fill="none" stroke="#3a2510"/><text x="600" y="278" fill="#a09080">E7</text>
    <rect x="560" y="292" width="80" height="32" fill="none" stroke="#3a2510"/><text x="600" y="312" fill="#a09080">E8</text>
  </g>

  <!-- Converging active paths to output -->
  <line x1="540" y1="274" x2="760" y2="242" stroke="#FF8C42" stroke-width="1.5" marker-end="url(#ah)"/>
  <line x1="640" y1="240" x2="760" y2="242" stroke="#FF8C42" stroke-width="1.5" marker-end="url(#ah)"/>

  <!-- Output token stream -->
  <text x="760" y="214" font-size="9" fill="#a09080" letter-spacing="0.14em">OUTPUT STREAM</text>
  <g font-size="9" fill="#fff0e0" text-anchor="middle">
    <rect x="760" y="230" width="28" height="24" fill="none" stroke="#FF8C42" stroke-width="1"/><text x="774" y="245">o1</text>
    <rect x="792" y="230" width="28" height="24" fill="none" stroke="#FF8C42" stroke-width="1"/><text x="806" y="245">o2</text>
    <rect x="824" y="230" width="28" height="24" fill="none" stroke="#FF8C42" stroke-width="1"/><text x="838" y="245">o3</text>
    <rect x="856" y="230" width="28" height="24" fill="none" stroke="#FF8C42" stroke-width="1"/><text x="870" y="245">o4</text>
    <rect x="888" y="230" width="20" height="24" fill="none" stroke="#FF8C42" stroke-width="1"/><text x="898" y="245">o5</text>
  </g>

  <!-- Flowing dots along active routing paths -->
  <circle r="2.5" fill="#FF8C42">
    <animateMotion dur="3s" repeatCount="indefinite" rotate="auto">
      <mpath href="#p1"/>
    </animateMotion>
  </circle>
  <circle r="2.5" fill="#FF8C42">
    <animateMotion dur="3s" begin="1.5s" repeatCount="indefinite" rotate="auto">
      <mpath href="#p2"/>
    </animateMotion>
  </circle>
  <circle r="2" fill="#FF8C42" opacity="0.7">
    <animateMotion dur="3s" begin="0.7s" repeatCount="indefinite">
      <mpath href="#p1"/>
    </animateMotion>
  </circle>

  <!-- 4. ROPE POSITION SCALING AXIS -->
  <text x="460" y="320" font-size="9" fill="#a09080" text-anchor="middle" letter-spacing="0.18em">ROPE POSITION SCALING</text>
  <rect x="560" y="343" width="320" height="4" fill="#FF8C42" opacity="0.6"/>
  <line x1="40" y1="345" x2="880" y2="345" stroke="#3a2510" stroke-width="1"/>

  <!-- Ticks -->
  <g stroke="#3a2510" stroke-width="1">
    <line x1="40"  y1="342" x2="40"  y2="348"/>
    <line x1="200" y1="342" x2="200" y2="348"/>
    <line x1="360" y1="342" x2="360" y2="348"/>
  </g>
  <g stroke="#FF8C42" stroke-width="2">
    <line x1="560" y1="341" x2="560" y2="349"/>
    <line x1="880" y1="341" x2="880" y2="349"/>
  </g>

  <!-- Tick labels -->
  <g font-size="11" text-anchor="middle" fill="#a09080">
    <text x="40"  y="363">0</text>
    <text x="200" y="363">8K</text>
    <text x="360" y="363">32K</text>
    <text x="560" y="363">128K</text>
    <text x="880" y="363" fill="#FF8C42" font-weight="700">1M</text>
  </g>

  <!-- 5. BOTTOM KEYWORD STRIP -->
  <text x="460" y="400" font-size="11" fill="#a09080" text-anchor="middle" letter-spacing="0.1em">SPARSE-MoE <tspan fill="#FF8C42">·</tspan> TOP-K=2 <tspan fill="#FF8C42">·</tspan> GQA <tspan fill="#FF8C42">·</tspan> ROPE+YARN <tspan fill="#FF8C42">·</tspan> KV-CACHE <tspan fill="#FF8C42">·</tspan> DETERMINISTIC-DECODE</text>
</svg>
